<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blop — iPhone 15 Pro Max Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 30%, #1e1b4b 0%, #0f0f1a 60%, #020208 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow-x: hidden;
      padding: 32px 24px;
    }

    .label {
      color: rgba(255,255,255,0.38);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 24px;
      font-weight: 500;
    }

    /* Phone frame */
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #1c1c1e;
      border-radius: 54px;
      box-shadow:
        0 0 0 1.5px #3a3a3c,
        0 0 0 3px #1c1c1e,
        0 0 0 4px #3a3a3c,
        0 40px 120px rgba(0,0,0,0.8),
        0 0 80px rgba(99,102,241,0.15);
      flex-shrink: 0;
    }

    /* Side buttons */
    .btn-power {
      position: absolute;
      right: -3.5px;
      top: 160px;
      width: 3.5px;
      height: 82px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
    }
    .btn-vol-up {
      position: absolute;
      left: -3.5px;
      top: 136px;
      width: 3.5px;
      height: 56px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
    }
    .btn-vol-down {
      position: absolute;
      left: -3.5px;
      top: 204px;
      width: 3.5px;
      height: 56px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
    }
    .btn-mute {
      position: absolute;
      left: -3.5px;
      top: 96px;
      width: 3.5px;
      height: 32px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
    }

    /* Screen bezel */
    .screen-bezel {
      position: absolute;
      inset: 12px;
      background: #000;
      border-radius: 44px;
      overflow: hidden;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* App iframe */
    .app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 44px;
    }

    /* Home indicator */
    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 100px;
      z-index: 10;
    }

    /* Reflection shine */
    .shine {
      position: absolute;
      inset: 12px;
      border-radius: 44px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.06) 0%,
        transparent 40%,
        transparent 60%,
        rgba(255,255,255,0.02) 100%
      );
      pointer-events: none;
      z-index: 20;
    }

    .nav-row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .nav-btn {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.95);
    }
  </style>
</head>
<body>
  <p class="label">iPhone 15 Pro Max &nbsp;·&nbsp; 393 × 852</p>

  <div class="phone">
    <div class="btn-power"></div>
    <div class="btn-vol-up"></div>
    <div class="btn-vol-down"></div>
    <div class="btn-mute"></div>

    <div class="screen-bezel">
      <div class="dynamic-island"></div>
      <iframe
        class="app-frame"
        id="appFrame"
        src="/home"
        title="blop app"
        allow="same-origin"
      ></iframe>
      <div class="home-bar"></div>
    </div>

    <div class="shine"></div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="navigate('/home')">Home</button>
    <button class="nav-btn" onclick="navigate('/group/1')">Group</button>
    <button class="nav-btn" onclick="navigate('/settings')">Settings</button>
    <button class="nav-btn" onclick="navigate('/onboarding')">Onboarding</button>
  </div>

  <script>
    function navigate(path) {
      document.getElementById('appFrame').src = path;
    }
  </script>
</body>
</html>
